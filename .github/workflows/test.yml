name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        # ARM Linux and ARM Windows runners are intentionally omitted:
        # Raku/setup-raku@v1 doesn't publish prebuilt Rakudo tarballs
        # for those platforms, so we can't run Raku tests there. The
        # CRoaring prebuilts for those arches are validated by the
        # CRoaring build-binaries.yml workflow (successful link +
        # correct symbol exports + universal-binary layout); first-
        # party end-to-end testing picks up as soon as upstream Raku
        # ships ARM prebuilts, or via a Docker-container-based job
        # against rakudo/rakudo-star multi-arch images.
        os:
          - ubuntu-latest         # Linux x86_64 glibc
          - macos-latest          # macOS arm64 (uses universal CRoaring dylib)
          - windows-latest        # Windows x86_64
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      # Kept as belt-and-braces: CRoaring ships prebuilt DLLs so
      # zef install normally skips compilation, but if the download
      # fails the fallback path needs MSVC to build from source.
      - name: Setup VS Dev Environment
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }

          $installPath = & $vswhere -nologo -latest -products * `
              -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          if (-not $installPath) { throw 'No VS installation with VC.Tools.x86.x64 found' }
          Write-Host "VS install: $installPath"

          $vsdevcmd = Join-Path $installPath 'Common7\Tools\vsdevcmd.bat'
          if (-not (Test-Path $vsdevcmd)) { throw "vsdevcmd.bat not found at $vsdevcmd" }

          $arch = $env:PROCESSOR_ARCHITECTURE.ToLower()
          $before = @{}
          Get-ChildItem env: | ForEach-Object { $before[$_.Name] = $_.Value }

          $lines = & cmd /c "`"$vsdevcmd`" -no_logo -host_arch=$arch -arch=$arch && set"
          if ($LASTEXITCODE -ne 0) { throw "vsdevcmd failed (exit $LASTEXITCODE)" }

          foreach ($line in $lines) {
              if ($line -notmatch '^([^=]+)=(.*)$') { continue }
              $name  = $Matches[1]
              $value = $Matches[2]
              if ($before.ContainsKey($name) -and $before[$name] -eq $value) { continue }
              Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
          }
      - name: Install Dependencies
        run: zef install --/test --test-depends --deps-only .
      - name: Install App::Prove6
        run: zef install --/test App::Prove6
      - name: Run Tests
        run: prove6 --verbose -I. t
