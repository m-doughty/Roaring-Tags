name: test

on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:

jobs:
  raku:
    strategy:
      fail-fast: false
      matrix:
        # ARM Linux and ARM Windows runners are intentionally omitted:
        # Raku/setup-raku@v1 doesn't publish prebuilt Rakudo tarballs
        # for those platforms, so we can't run Raku tests there. The
        # CRoaring prebuilts for those arches are validated by the
        # CRoaring build-binaries.yml workflow (successful link +
        # correct symbol exports + universal-binary layout); first-
        # party end-to-end testing picks up as soon as upstream Raku
        # ships ARM prebuilts, or via a Docker-container-based job
        # against rakudo/rakudo-star multi-arch images.
        os:
          - ubuntu-latest         # Linux x86_64 glibc
          - macos-latest          # macOS arm64 (uses universal CRoaring dylib)
          - windows-latest        # Windows x86_64
        raku-version:
          - 'latest'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Raku/setup-raku@v1
        with:
          raku-version: ${{ matrix.raku-version }}
      # Kept as belt-and-braces: CRoaring ships prebuilt DLLs so
      # zef install normally skips compilation, but if the download
      # fails the fallback path needs MSVC to build from source.
      - name: Setup VS Dev Environment
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-vsdevenv@v6
      - name: Install Dependencies
        run: zef install --/test --test-depends --deps-only .
      - name: Install App::Prove6
        run: zef install --/test App::Prove6
      - name: Run Tests
        run: prove6 --verbose -I. t
